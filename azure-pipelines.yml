trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: SyntaxCheck
    displayName: "Syntax Check"
    jobs:
      - job: SyntaxCheckJob
        displayName: "py_compile all .py files"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
            displayName: "Use Python 3.11"

          - script: |
              echo "=== Running syntax check on all .py files ==="
              find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" | while read f; do
                echo "Checking $f"
                python -m py_compile "$f" || exit 1
              done
              echo "=== All files passed syntax check ==="
            displayName: "Compile-check Python files"

  - stage: Test
    displayName: "Run Tests"
    dependsOn: SyntaxCheck
    jobs:
      - job: UnitTests
        displayName: "pytest + publish results"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
            displayName: "Use Python 3.11"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install dependencies"

          - script: |
              python -m pytest tests/ \
                --junitxml=test-results/results.xml \
                -v
            displayName: "Run unit tests"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results/results.xml"
              mergeTestResults: true
              testRunTitle: "DisputeService Unit Tests"
            displayName: "Publish test results"

          - task: PublishBuildArtifacts@1
            condition: succeededOrFailed()
            inputs:
              PathtoPublish: "test-results"
              ArtifactName: "TestResults"
              publishLocation: "Container"
            displayName: "Upload test results artifact"
