trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  # ───────── Stage 1: Syntax Check ─────────
  - stage: SyntaxCheck
    displayName: "Syntax & Lint Check"
    jobs:
      - job: PySyntaxCheck
        displayName: "Python syntax check (py_compile)"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
            displayName: "Use Python 3.11"

          - script: |
              echo "Checking syntax of all .py files..."
              python -m py_compile main.py
              python -m py_compile database.py
              python -m py_compile models.py
              python -m py_compile schemas.py
              python -m py_compile config.py
              python -m py_compile seed.py
              python -m py_compile message_reader.py
              echo "All files passed syntax check."
            displayName: "py_compile — syntax check"

  # ───────── Stage 2: Run Tests & Publish ─────────
  - stage: RunTests
    displayName: "Run Unit Tests"
    dependsOn: SyntaxCheck
    jobs:
      - job: UnitTests
        displayName: "pytest + publish results"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
            displayName: "Use Python 3.11"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements
              pip install pytest pytest-cov httpx
            displayName: "Install dependencies"

          - script: |
              python -m pytest tests/ \
                --junitxml=test-results/results.xml \
                --tb=short -v
            displayName: "Run pytest"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results/results.xml"
              mergeTestResults: true
              testRunTitle: "DisputeService Unit Tests"
            displayName: "Publish test results"

          - task: PublishBuildArtifacts@1
            condition: succeededOrFailed()
            inputs:
              PathtoPublish: "test-results"
              ArtifactName: "TestResults"
              publishLocation: "Container"
            displayName: "Upload test results as artifact"
